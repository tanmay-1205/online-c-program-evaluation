services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PROBLEMS_DIR=/app/problems
      - SUBMISSIONS_DIR=/app/data/submissions
    volumes:
      - ./problems:/app/problems:ro
      - submissions_data:/app/data/submissions
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_COUNT=8
      - PROBLEMS_DIR=/app/problems
      - SUBMISSIONS_DIR=/app/data/submissions
    volumes:
      - ./problems:/app/problems:ro
      - submissions_data:/app/data/submissions
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  redis_data:
  submissions_data:
